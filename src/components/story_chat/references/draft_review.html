<!doctype html><html><head><meta charset='utf-8'><title>Draft</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#f4f5f7;display:flex;justify-content:center;padding:24px}
.device{width:390px;height:844px;background:#fff;border-radius:28px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 18px 48px rgba(0,0,0,.12)}
.header{height:64px;border-bottom:1px solid #ececec;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.seg{display:flex;background:#efefef;padding:4px;border-radius:999px;gap:4px}
.seg div{width:40px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:999px}
.active{background:#5b5cff;color:#fff}
.chat{flex:1;overflow:auto;padding:18px}
.name{font-size:12px;color:#777;margin:6px 0}
.bot,.user{max-width:80%;padding:14px 16px;border-radius:18px;line-height:1.55;margin-bottom:14px}
.bot{background:#eef0ff}
.user{background:#f5f5f5;margin-left:auto}
.footer{border-top:1px solid #ececec;padding:18px}
.mic{width:90px;height:90px;background:#5b5cff;color:#fff;border-radius:50%;margin:auto;display:flex;align-items:center;justify-content:center;font-size:36px}
.tip{text-align:center;color:#777;margin-top:14px}
textarea,input{width:100%;border:1px solid #ddd;border-radius:14px;padding:14px;font-size:16px}
textarea{height:110px;resize:none}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.btn{padding:11px 20px;border-radius:999px;border:none}
.primary{background:#5b5cff;color:#fff}
.sendIn{position:relative}
.sendIn input{padding-right:52px}
.sendIcon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#5b5cff;font-size:22px}
.content{flex:1;overflow:auto;padding:22px}
.item{display:flex;justify-content:space-between;gap:16px;padding:18px 0;border-bottom:1px solid #ececec}
.actions{white-space:nowrap}
@media(min-width:900px){
.device{width:min(900px,94vw);height:90vh}
.chat,.content,.footer{max-width:760px;width:100%;margin:auto}
}
</style></head><body><div class='device'><div class='header'><div>←</div><div class='seg'><div class='active'>🎤</div><div>⌨️</div></div><div>⚙️</div></div>
<div class='chat'>
<div class='name'>Sky</div>
<div class='bot'>Chào bạn 👋<br><br>Mỗi lần chỉ cần kể một ý ngắn rồi thả tay để xem lại trước khi gửi.<br><br>Hôm nay của bạn thế nào?</div>
<div class='user'>Hôm nay mình dậy hơi muộn.</div>
<div class='user'>Sau đó mình đưa con đi học.</div>
<div class='name'>Sky</div>
<div class='bot'>Mình đang ghi lại rồi. Bạn kể tiếp nhé.</div>
</div>
<div class='footer'><textarea>Tôi hôm nay dậy hơi muộn. Sau đó đưa con đi học.</textarea><div class='row'><button class='btn'>🗑 Xóa</button><button class='btn'>✏️ Sửa</button><button class='btn primary'>Gửi</button></div></div></div></body></html>
